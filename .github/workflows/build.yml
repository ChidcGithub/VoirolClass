name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build onefile EXE (standalone)
        run: |
          pyinstaller --onefile --windowed `
            --name VoirolClass `
            --icon assets/img/icon.png `
            --hidden-import keyboard `
            --collect-all PyQt6 `
            --add-data "assets;assets" `
            --add-data "fonts;fonts" `
            main.py

      - name: Build onedir (for installer)
        run: |
          Remove-Item -Recurse -Force dist/VoirolClass -ErrorAction SilentlyContinue
          pyinstaller --onedir --windowed `
            --name VoirolClass `
            --icon assets/img/icon.png `
            --hidden-import keyboard `
            --collect-all PyQt6 `
            --add-data "assets;assets" `
            --add-data "fonts;fonts" `
            main.py

      - name: Verify executables exist
        run: |
          Test-Path dist/VoirolClass.exe
          Test-Path dist/VoirolClass/VoirolClass.exe

      - name: Install NSIS
        run: choco install nsis -y

      - name: Convert icon to ICO
        run: |
          pip install Pillow
          python -c "from PIL import Image; img = Image.open('assets/img/icon.png'); img.save('assets/img/icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build installer
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) {
            $nsis = "makensis"
          }
          & $nsis "/DVERSION=$ver" installer.nsi

      - name: Verify installer exists
        run: Get-ChildItem VoirolClass-*-Setup.exe

      - name: Generate release notes
        run: |
          $prev = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $prev) { $prev = "HEAD~1" }
          git log --oneline $prev..HEAD | Out-File -FilePath release_notes.txt -Encoding utf8
          Get-Content release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VoirolClass.exe
            VoirolClass-*-Setup.exe
          body_path: release_notes.txt
          generate_release_notes: true
